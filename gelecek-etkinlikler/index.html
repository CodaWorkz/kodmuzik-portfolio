<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>Gelecek - Kodmüzik</title>
    <meta
      name="description"
      content="KOD Müzik gelecek etkinlikleri - 2026 ve sonrası"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;500&family=TASA+Orbiter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Global Styles -->
    <link rel="stylesheet" href="/css/main.css" />
    <!-- Future Events Styles -->
    <link rel="stylesheet" href="/css/future-events.css" />
    <!-- Canonical URL -->
    <link
      rel="canonical"
      href="https://www.kodmuzik.com/gelecek-etkinlikler/"
    />
    <!-- Hreflang -->
    <link
      rel="alternate"
      hreflang="x-default"
      href="https://www.kodmuzik.com/gelecek-etkinlikler/"
    />
    <link
      rel="alternate"
      hreflang="tr"
      href="https://www.kodmuzik.com/gelecek-etkinlikler/"
    />
    <link
      rel="alternate"
      hreflang="en"
      href="https://www.kodmuzik.com/en/upcoming-events/"
    />
  </head>
  <body>
    <!-- Skip to content link for screen readers -->
    <a href="#main-content" class="skip-to-content">İçeriğe geç</a>

    <!-- Side Menu -->
    <nav class="side-menu" aria-label="Ana menü">
      <!-- Logo/Home -->
      <a href="/" class="menu-logo" aria-label="Kodmüzik ana sayfa">
        <img
          src="/KodLogo.svg"
          alt="Kodmüzik logosu"
          class="menu-logo-img"
          loading="eager"
          decoding="async"
        />
        <span class="menu-logo-caption" aria-hidden="true"
          ><span class="menu-logo-letter">K</span
          ><span class="menu-logo-letter">O</span
          ><span class="menu-logo-letter">D</span
          ><span class="menu-logo-letter">M</span
          ><span class="menu-logo-letter">Ü</span
          ><span class="menu-logo-letter">Z</span
          ><span class="menu-logo-letter">İ</span
          ><span class="menu-logo-letter">K</span></span
        >
      </a>

      <!-- Navigation -->
      <div class="menu-nav">
        <ul class="menu-items">
          <li class="menu-item">
            <a href="/hakkimizda/" class="menu-link" data-path="/hakkimizda"
              >HAKKIMIZDA</a
            >
          </li>
          <li class="menu-item">
            <a href="/etkinlikler/" class="menu-link" data-path="/etkinlikler"
              >GEÇMİŞ</a
            >
          </li>
          <li class="menu-item">
            <a
              href="/gelecek-etkinlikler/"
              class="menu-link"
              data-path="/gelecek-etkinlikler"
              >GELECEK</a
            >
          </li>
          <li class="menu-item">
            <a href="/iletisim/" class="menu-link" data-path="/iletisim"
              >İLETİŞİM</a
            >
          </li>
        </ul>
      </div>

      <!-- Language Toggle -->
      <div class="lang-toggle-menu" aria-label="Dil seçimi">
        <div class="lang-switcher" role="group" aria-label="Dil seçimi">
          <a
            href="/gelecek-etkinlikler/"
            class="lang-link"
            id="lang-tr"
            hreflang="tr"
            lang="tr"
            >TR</a
          >
          <a
            href="/en/upcoming-events/"
            class="lang-link"
            id="lang-en"
            hreflang="en"
            lang="en"
            >EN</a
          >
        </div>
      </div>
    </nav>

    <!-- SVG filters for sign surface texture — hidden, referenced by CSS -->
    <svg class="sr-only" aria-hidden="true" style="position:absolute;width:0;height:0">
      <defs>
        <!-- Fine grain — the base matte surface of the sign panel -->
        <filter id="grain" x="0" y="0" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch" result="noise"/>
          <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
          <feComponentTransfer in="mono" result="final">
            <feFuncA type="linear" slope="0.12"/>
          </feComponentTransfer>
        </filter>
        <!-- Coarser imperfections — dust, micro-scratches -->
        <filter id="imperfections" x="0" y="0" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.15 0.35" numOctaves="2" seed="3" stitchTiles="stitch" result="noise"/>
          <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
          <feComponentTransfer in="mono" result="final">
            <feFuncA type="linear" slope="0.08"/>
          </feComponentTransfer>
        </filter>
      </defs>
    </svg>

    <!-- Main Content -->
    <main id="main-content" class="main-content future-page">
      <div class="future-placeholder">
        <div class="lightboard" role="status" aria-label="Gelecek etkinlikler yakında">
          <!-- Surface layers — texture that catches the light -->
          <div class="lightboard-surface lightboard-grain" aria-hidden="true"></div>
          <div class="lightboard-surface lightboard-imperfections" aria-hidden="true"></div>
          <!-- Content -->
          <h1 class="lightboard-title">Gelecek Etkinlikler</h1>
          <hr class="lightboard-rule" aria-hidden="true" />
          <p class="lightboard-sub">Yakında açıklanacak</p>
        </div>
      </div>
    </main>

    <!-- Global Scripts -->
    <script src="/js/utils.js" defer></script>
    <script src="/js/main.js" defer></script>
    <script src="/js/future-events.js" defer></script>
  </body>
</html>
